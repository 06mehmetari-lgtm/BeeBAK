services:
  postgres:
    image: postgres:16-alpine
    container_name: beebak-postgres
    restart: always
    environment:
      POSTGRES_DB: BeeBAK
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 11051994
    volumes:
      - beebak_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d BeeBAK"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: beebak-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: beebak-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: beebak
      RABBITMQ_DEFAULT_PASS: beebak
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: beebak-selenium-hub
    restart: always
    environment:
      # CX33 (4 çekirdek): 4 node × 3 session = 12 eş zamanlı Selenium oturumu
      SE_NODE_MAX_SESSIONS: "12"
      GRID_NEW_SESSION_WAIT_TIMEOUT: "60000"
      GRID_BROWSER_TIMEOUT: "180"
      GRID_TIMEOUT: "300"
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4444/wd/hub/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  chrome-node:
    image: selenium/node-chrome:4.27.0
    restart: always
    shm_size: 512m
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
      SE_NODE_MAX_SESSIONS: "3"
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_NODE_SESSION_TIMEOUT: "180"
      SE_VNC_NO_PASSWORD: "1"
      SE_OPTS: "--detect-drivers true"
    deploy:
      # CX33: 4 node × 3 session = 12 eş zamanlı Selenium oturumu
      replicas: 4
      resources:
        limits:
          cpus: "0.8"
          memory: 700M

  dbmigrator:
    build:
      context: .
      dockerfile: Dockerfile.dbmigrator
    container_name: beebak-dbmigrator
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=BeeBAK;Username=postgres;Password=11051994"
      # ApplicationModule OpenIddict/Medallion distributed lock için gerekli (Redis yoksa IDistributedLockProvider çözülmez)
      Redis__Configuration: "redis:6379"
      Redis__InstanceName: "BeeBAK:"
      BackgroundJobs__IsJobExecutionEnabled: "false"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: beebak-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      dbmigrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=BeeBAK;Username=postgres;Password=11051994"
      Redis__Configuration: "redis:6379"
      RabbitMq__Connections__Default__HostName: "rabbitmq"
      RabbitMq__Connections__Default__Port: "5672"
      RabbitMq__Connections__Default__UserName: "beebak"
      RabbitMq__Connections__Default__Password: "beebak"
      BackgroundJobs__IsJobExecutionEnabled: "false"
      App__SelfUrl: "http://localhost:44381"
      App__CorsOrigins: "http://localhost:4200,https://localhost:4200"
      App__RedirectAllowedUrls: "http://localhost:4200"
      AuthServer__Authority: "http://localhost:44381"
      AuthServer__RequireHttpsMetadata: "false"
      AuthServer__UseDevelopmentCertificate: "true"
      App__HealthUiCheckUrl: "http://localhost:8080/health-status"
      Cimri__BaseUrl: "https://www.cimri.com"
      Cimri__AllowedCimriHostSuffix: "cimri.com"
      Cimri__SeleniumGridUrl: "http://selenium-hub:4444/wd/hub"
      Cimri__SeleniumHeadless: "true"
      Cimri__BlockImages: "true"
      Cimri__BlockFonts: "true"
      Cimri__UseQueue: "true"
      Cimri__DefaultMaxPages: "1"
      Cimri__DefaultMaxProducts: "10"
      Akakce__BaseUrl: "https://www.akakce.com"
      Akakce__AllowedAkakceHostSuffix: "akakce.com"
      Akakce__ListingPageUrl: "https://www.akakce.com/fiyati-dusen-urunler/?s=3"
      Akakce__SeleniumGridUrl: "http://selenium-hub:4444/wd/hub"
      Akakce__SeleniumHeadless: "true"
      Akakce__BlockImages: "true"
      Akakce__BlockFonts: "true"
      Akakce__UseQueue: "true"
      Akakce__DefaultMaxPages: "1"
      Akakce__DefaultMaxProducts: "10"
      # Telegram (kart / bildirim); appsettings ile aynı — ortam değişkeni önceliklidir
      Cimri__Telegram__BotToken: "8754349662:AAGQ7d4VOGav9lL6bx_kqzS2xboBxdHEmVg"
      Cimri__Telegram__ChatId: "-1003740852935"
      Cimri__Telegram__ShareProductCardsOnIngest: "true"
      Cimri__Telegram__MinDiscountPercentForTelegram: "5"
      Cimri__Telegram__TelegramCardDedupHours: "24"
    ports:
      - "44381:8080"
    volumes:
      - beebak_dataprotection:/root/.aspnet/DataProtection-Keys
    deploy:
      resources:
        limits:
          memory: 768M

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    healthcheck:
      # Her 1 dakikada kontrol — 3 başarısız = yeniden başlat
      test: ["CMD-SHELL", "pgrep -f BeeBAK.WorkerHost || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      resources:
        limits:
          # CX33: 8GB RAM → worker için 1.5GB yeterli
          memory: 1536M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      selenium-hub:
        condition: service_healthy
      dbmigrator:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: "Production"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=BeeBAK;Username=postgres;Password=11051994"
      Redis__Configuration: "redis:6379"
      RabbitMq__Connections__Default__HostName: "rabbitmq"
      RabbitMq__Connections__Default__Port: "5672"
      RabbitMq__Connections__Default__UserName: "beebak"
      RabbitMq__Connections__Default__Password: "beebak"
      RabbitMq__Connections__Default__RequestedHeartbeat: "30"
      RabbitMq__Connections__Default__NetworkRecoveryInterval: "10"
      RabbitMq__Connections__Default__AutomaticRecoveryEnabled: "true"
      BackgroundJobs__IsJobExecutionEnabled: "true"
      # ── Cimri Selenium ayarları (CX33 hızlı) ───────────────────────────
      Cimri__BaseUrl: "https://www.cimri.com"
      Cimri__AllowedCimriHostSuffix: "cimri.com"
      Cimri__SeleniumGridUrl: "http://selenium-hub:4444/wd/hub"
      Cimri__SeleniumHeadless: "true"
      Cimri__SeleniumCommandTimeoutMs: "90000"
      Cimri__BlockImages: "true"
      Cimri__BlockFonts: "true"
      Cimri__UseQueue: "true"
      Cimri__DefaultMaxPages: "1"
      Cimri__DefaultMaxProducts: "10"
      Cimri__DedupTtlSeconds: "21600"
      Cimri__ScrollPasses: "1"
      Cimri__ScrollPauseMs: "100"
      Cimri__DetailWaitTimeoutMs: "6000"
      Cimri__ExpandOffersClickPauseMs: "300"
      Cimri__LoadMoreClickPauseMs: "400"
      Cimri__DelayBetweenProductsMs: "0"
      Cimri__OfferResolveTimeoutMs: "3000"
      Cimri__MaxOfferUrlsToResolveViaSelenium: "5"
      Cimri__OfferUrlCacheTtlSeconds: "604800"
      Cimri__RequireMerchantProductId: "false"
      Cimri__SkipProductWithoutQualifiedOffers: "false"
      # ── Akakce Selenium ayarları (CX33 hızlı) ──────────────────────────
      Akakce__BaseUrl: "https://www.akakce.com"
      Akakce__AllowedAkakceHostSuffix: "akakce.com"
      Akakce__ListingPageUrl: "https://www.akakce.com/fiyati-dusen-urunler/?s=3"
      Akakce__SeleniumGridUrl: "http://selenium-hub:4444/wd/hub"
      Akakce__SeleniumHeadless: "true"
      Akakce__SeleniumCommandTimeoutMs: "90000"
      Akakce__BlockImages: "true"
      Akakce__BlockFonts: "true"
      Akakce__UseQueue: "true"
      Akakce__DefaultMaxPages: "1"
      Akakce__DefaultMaxProducts: "10"
      Akakce__DedupTtlSeconds: "21600"
      Akakce__ProductDetailEnqueueBatchSize: "10"
      Akakce__ScrollPasses: "1"
      Akakce__ScrollPauseMs: "100"
      Akakce__ListingWaitTimeoutMs: "12000"
      Akakce__DetailWaitTimeoutMs: "10000"
      Akakce__DelayBetweenProductsMs: "0"
      # ── RabbitMQ job işleme ─────────────────────────────────────────────
      # CX33: 4 çekirdek → 6 iş aynı anda (Selenium bottleneck'i önlemek için)
      RabbitMq__BackgroundJobs__PrefetchCount: "6"
      # ── Telegram ───────────────────────────────────────────────────────
      Cimri__Telegram__BotToken: "8754349662:AAGQ7d4VOGav9lL6bx_kqzS2xboBxdHEmVg"
      Cimri__Telegram__ChatId: "-1003740852935"
      Cimri__Telegram__ShareProductCardsOnIngest: "true"
      Cimri__Telegram__MinDiscountPercentForTelegram: "5"
      Cimri__Telegram__TelegramCardDedupHours: "0"
      # ── Cimri yayın motoru ──────────────────────────────────────────────
      Cimri__Publish__MinDelayMinutes: "2"
      Cimri__Publish__MaxDelayMinutes: "5"
      Cimri__Publish__MinDiscountPercent: "5"
      Cimri__Publish__QuietStartHour: "3"
      Cimri__Publish__QuietEndHour: "6"
      # ── Robot 1: Cimri — 3 URL AYNI ANDA (CX33: 20 sayfa × 3 URL) ─────
      Cimri__AutoSync__Enabled: "true"
      Cimri__AutoSync__IntervalHours: "2"
      Cimri__AutoSync__CategoryIntervalMinutes: "20"
      Cimri__AutoSync__RunOnStart: "true"
      Cimri__AutoSync__MaxPages: "20"
      Cimri__AutoSync__MaxProducts: "2000"
      Cimri__AutoSync__CategoryUrls__0: "https://www.cimri.com/indirimli-urunler?sort=new%2Cdesc"
      Cimri__AutoSync__CategoryUrls__1: "https://www.cimri.com/indirimli-urunler?sort=discount%2Cdesc"
      Cimri__AutoSync__CategoryUrls__2: "https://www.cimri.com/indirimli-urunler"
      # ── Robot 2: Cimri fiyat izleme ─────────────────────────────────────
      Cimri__PriceWatch__Enabled: "true"
      Cimri__PriceWatch__IntervalMinutes: "60"
      Cimri__PriceWatch__RunOnStart: "false"
      Cimri__PriceWatch__ProductAgeDays: "3"
      Cimri__PriceWatch__ResyncAfterMinutes: "50"
      Cimri__PriceWatch__MaxProductsPerRun: "300"
      # ── Robot 1: Akakçe — fark-atan-fiyatlar (CX33: 15 sayfa) ──────────
      Akakce__AutoSync__Enabled: "true"
      Akakce__AutoSync__IntervalHours: "2"
      Akakce__AutoSync__CategoryIntervalMinutes: "20"
      Akakce__AutoSync__RunOnStart: "true"
      Akakce__AutoSync__MaxPages: "15"
      Akakce__AutoSync__MaxProducts: "1000"
      # fark-atan-fiyatlar: farklı HTML yapısı — li[data-pr] yok, parse edilemiyor
      # fiyati-dusen-urunler: test edilmiş, çalışıyor
      Akakce__AutoSync__CategoryUrls__0: "https://www.akakce.com/fiyati-dusen-urunler/?s=3"
      Akakce__AutoSync__CategoryUrls__1: "https://www.akakce.com/fiyati-dusen-urunler/?c=1&s=3"
      Akakce__AutoSync__CategoryUrls__2: "https://www.akakce.com/fiyati-dusen-urunler/?c=2&s=3"
      Akakce__AutoSync__CategoryUrls__3: "https://www.akakce.com/fiyati-dusen-urunler/?c=4&s=3"
      Akakce__AutoSync__CategoryUrls__4: "https://www.akakce.com/fiyati-dusen-urunler/?c=9&s=3"
      Akakce__AutoSync__CategoryUrls__5: "https://www.akakce.com/fiyati-dusen-urunler/?c=7&s=3"
      # ── Robot 2: Akakçe fiyat izleme ─────────────────────────────────────
      Akakce__PriceWatch__Enabled: "true"
      Akakce__PriceWatch__IntervalMinutes: "60"
      Akakce__PriceWatch__RunOnStart: "false"
      Akakce__PriceWatch__ProductAgeDays: "3"
      Akakce__PriceWatch__ResyncAfterMinutes: "50"
      Akakce__PriceWatch__MaxProductsPerRun: "300"
      # ── Akakçe yayın motoru ─────────────────────────────────────────────
      Akakce__Publish__MinDelayMinutes: "2"
      Akakce__Publish__MaxDelayMinutes: "5"
      Akakce__Publish__MinDiscountPercent: "5"
      Akakce__Publish__QuietStartHour: "3"
      Akakce__Publish__QuietEndHour: "6"

volumes:
  beebak_pg:
  beebak_dataprotection:
