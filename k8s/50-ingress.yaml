apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beebak-api-ingress
  namespace: beebak
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: beebak.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beebak-api
                port:
                  number: 80
